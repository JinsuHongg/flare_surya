# @package _global_

data:
  train_flare_data_path: ./data/surya-bench-flare-forecasting/C24w/train_C24w_freq8.csv
  valid_flare_data_path: ./data/surya-bench-flare-forecasting/C24w/val_C24w.csv
  leaky_valid_flare_data_path: ./data/surya-bench-flare-forecasting/C24w/leaky_val_C24w.csv
  test_flare_data_path: ./data/surya-bench-flare-forecasting/C24w/test_C24w.csv
  apply_undersampling: false
  undersample_factor: 1
  seed: 1004

backbone:
  model_name: alexnet # resnet18, resnet34, resnet50, alexnet,

loss:
  type: cross_entropy
  cross_entropy:
    class_weights: [1.0, 1.1]
  focal:
    alpha: 0.5
    gamma: 0.99
    reduction: mean
    label_smoothing: 0.2

optimizer:
  type: adamw
  lr: 1e-4
  weight_decay: 1e-3

etc:
  phase: train # test
  resume: true
  ckpt_dir: ./results/checkpoints/baselines/alexnet/8hour_c/
  ckpt_name_tag: alexnet_8hour_c_ce_nosample
  ckpt_file: last.ckpt
  ckpt_weights_only: false
  max_epochs: 50

wandb:
  name: alexnet_8hour_c_ce_nosample_nasgh
  id: alexnet_8hour_c_ce_nosample_nasgh
  resume: allow
  project: flareforecasting-nosampling
  group: alexent
  notes: ""
  offline: false
  tag: ["alexnet", "C", "nasgh", "8hour", "cross_entropy", "nosample"] # backbone model, head type, task
