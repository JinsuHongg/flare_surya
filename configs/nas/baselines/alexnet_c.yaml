# @package _global_

data:
  train_flare_data_path: ../data/surya-bench-flare-forecasting/C24w/train_C24w_freq24.csv
  valid_flare_data_path: ../data/surya-bench-flare-forecasting/C24w/val_C24w.csv
  leaky_valid_flare_data_path: ../data/surya-bench-flare-forecasting/C24w/leaky_val_C24w.csv
  test_flare_data_path: ../data/surya-bench-flare-forecasting/C24w/test_C24w.csv

backbone:
  model_name: alexnet # resnet18, resnet34, resnet50, alexnet,

loss:
  type: focal 
  focal:
    alpha: 0.75
    gamma: 2.0
    reduction: mean
  flaressm:
    class_counts: [45000, 5000]  # [N_neg, N_pos] from your training set # please check manually
    lambda_bss: 3.0
    ib_start_epoch: 10

optimizer:
  type: adamw
  lr: 1e-3
  weight_decay: 1e-3

etc:
  phase: train # test
  resume: false
  ckpt_dir: ../results/check_point/baselines/alexnet/daily_c/
  ckpt_name_tag: alexnet_daily_c_focal
  ckpt_file: last.ckpt
  ckpt_weights_only: false

wandb:
  name: alexnet_daily_c_focal_nasgh
  id: alexnet_daily_c_focal_nasgh
  resume: allow
  notes: alexnet
  offline: false
  tag: ["alexnet", "C", "nasgh", "daily", "focal"] # backbone model, head type, task

