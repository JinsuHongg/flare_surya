# @package _global_

data:
  train_flare_data_path: ../data/surya-bench-flare-forecasting/X24w/train_X24w_freq24.csv
  valid_flare_data_path: ../data/surya-bench-flare-forecasting/X24w/val_X24w.csv
  leaky_valid_flare_data_path: ../data/surya-bench-flare-forecasting/X24w/leaky_val_X24w.csv
  test_flare_data_path: ../data/surya-bench-flare-forecasting/X24w/test_X24w.csv

backbone:
  model_name: resnet18 # resnet18, resnet34, resnet50, alexnet,

loss:
  type: focal 
  focal:
    alpha: 0.25
    gamma: 2.0
    reduction: mean

optimizer:
  type: adamw
  lr: 1e-5
  weight_decay: 1e-2

etc:
  phase: train # test
  resume: true
  ckpt_dir: ../results/check_point/baselines/resnet18/daily_x/
  ckpt_name_tag: resnet18_daily_x
  ckpt_file: last.ckpt  
  ckpt_weights_only: false

wandb:
  name: resnet18_daily_x_focal_nasgh_1
  id: resnet18_daily_x_focal_nasgh_1
  resume: allow
  notes: resnet18
  offline: false
  tag: ["resnet18", "X", "nasgh", "daily", "focal"] # backbone model, head type, task
