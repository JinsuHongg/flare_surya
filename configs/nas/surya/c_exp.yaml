# @package _global_

data:
  train_flare_data_path: ./data/surya-bench-flare-forecasting/C24w/train_C24w_freq24.csv
  valid_flare_data_path: ./data/surya-bench-flare-forecasting/C24w/val_C24w.csv
  leaky_valid_flare_data_path: ./data/surya-bench-flare-forecasting/C24w/leaky_val_C24w.csv
  test_flare_data_path: ./data/surya-bench-flare-forecasting/C24w/test_C24w.csv
  apply_undersampling: false
  undersample_factor: 1
  seed: 1004

backbone:
  pooling_type: attention_pooling

loss:
  type: cross_entropy
  cross_entropy:
    class_weights: [1.0, 1.1]
  focal:
    alpha: 0.5
    gamma: 0.99
    reduction: mean
    label_smoothing: 0.2

optimizer:
  type: adamw
  lr: 1.5e-4
  weight_decay: 0.02

etc:
  phase: train # test
  resume: true
  ckpt_dir: ./results/checkpoints/surya_flare/12hour_c/
  ckpt_name_tag: mlp_12hour_c_ce_nosample
  ckpt_file: last.ckpt
  ckpt_weights_only: false
  max_epochs: 50

wandb:
  name: mlp_12hour_c_ce_nosample_nasgh
  id: mlp_12hour_c_ce_nosample_nasgh
  resume: allow
  project: flareforecasting-nosampling
  group: surya
  notes: ""
  offline: false
  tag: ["mlp", "C", "12hour", "nasgh", "cross_entropy", "nosample"] # backbone model, head type, task
